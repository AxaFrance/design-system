version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
    open-pull-requests-limit: 6
    target-branch: "main"
    ignore:
      - dependency-name: "*storybook*" # ignore all storybook packages
  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
     minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    schedule:
      interval: "weekly"
    labels:
      - "gh-actions"
